<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Redirects after 5 seconds -->
    <meta http-equiv="refresh" content="5;url=https://dhamma-vinaya.org/">
    <title>We've Moved!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }
        h1 { margin-bottom: 10px; color: #2c3e50; }
        p { line-height: 1.6; color: #666; }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.3s;
        }
        .btn:hover { background-color: #2980b9; }
        .loader {
            height: 4px;
            width: 100%;
            background: #eee;
            margin-top: 30px;
            border-radius: 2px;
            overflow: hidden;
        }
        .loader-bar {
            height: 100%;
            width: 0;
            background: #3498db;
            animation: load 5s linear forwards;
        }
        @keyframes load { to { width: 100%; } }
    </style>
</head>
<body>
    <div class="card">
        <h1>We've Moved!</h1>
        <p>This site has relocated to a new home. You are being automatically redirected to our new location in a few seconds.</p>
        
        <div class="loader"><div class="loader-bar"></div></div>

        <a href="https://dhamma-vinaya.org/" class="btn">Take me there now</a>
        <p style="font-size: 0.8rem; margin-top: 15px;">If you are not redirected automatically, please click the button above.</p>
    </div>
</body>
</html>
